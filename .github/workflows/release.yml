name: Release

on:
    push:
        branches:
            - main

permissions:
    # Enable `semantic-release` to publish a GitHub release and push commits
    contents: write
    # Enable `semantic-release` to post comments on issues
    issues: write
    # Enable `semantic-release` to post comments on pull requests
    pull-requests: write
    # Enable the use of OIDC for trusted publishing and npm provenance
    id-token: write

# Release involves crucial steps that shouldn't be cancelled mid-run,
# so new workflow runs are queued until the previous one finishes.
concurrency:
    group: ${{ github.workflow }}
    cancel-in-progress: false

jobs:
    release:
        name: Release
        runs-on: ubuntu-latest
        timeout-minutes: 60

        steps:
            - name: Generate bot token
              id: generate_token
              uses: actions/create-github-app-token@v3
              with:
                  app-id: ${{ secrets.DOIST_RELEASE_BOT_ID }}
                  private-key: ${{ secrets.DOIST_RELEASE_BOT_PRIVATE_KEY }}
                  permission-contents: write
                  permission-issues: write
                  permission-pull-requests: write

            - name: Get bot user ID
              id: bot_user
              run: |
                  user_id=$(gh api "/users/${{ steps.generate_token.outputs.app-slug }}[bot]" --jq .id)
                  if [ -z "$user_id" ]; then
                      echo "Failed to get bot user ID" >&2
                      exit 1
                  fi
                  echo "id=$user_id" >> "$GITHUB_OUTPUT"
              env:
                  GH_TOKEN: ${{ steps.generate_token.outputs.token }}

            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  token: ${{ steps.generate_token.outputs.token }}
                  fetch-depth: 0

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version-file: .nvmrc
                  cache: npm
                  scope: '@doist'
                  registry-url: 'https://registry.npmjs.org/'

            - name: Install dependencies
              run: npm ci

            - name: Capture previous tag
              id: previous_tag
              run: echo "tag=$(git describe --tags --abbrev=0 --match 'v[0-9]*' 2>/dev/null || true)" >> "$GITHUB_OUTPUT"

            - name: Release
              run: npx semantic-release
              env:
                  GITHUB_TOKEN: ${{ steps.generate_token.outputs.token }}
                  GIT_AUTHOR_NAME: ${{ steps.generate_token.outputs.app-slug }}[bot]
                  GIT_AUTHOR_EMAIL: ${{ steps.bot_user.outputs.id }}+${{ steps.generate_token.outputs.app-slug }}[bot]@users.noreply.github.com
                  GIT_COMMITTER_NAME: ${{ steps.generate_token.outputs.app-slug }}[bot]
                  GIT_COMMITTER_EMAIL: ${{ steps.bot_user.outputs.id }}+${{ steps.generate_token.outputs.app-slug }}[bot]@users.noreply.github.com

            # `npm publish` happens before later semantic-release plugins, so the
            # dispatch path runs even when the Release step fails partway: a new
            # version may already be live on npm. The Release failure still fails
            # the workflow.
            - name: Detect published version
              if: ${{ !cancelled() && steps.previous_tag.conclusion == 'success' }}
              id: published
              env:
                  PREVIOUS_TAG: ${{ steps.previous_tag.outputs.tag }}
              run: |
                  git fetch --force --tags origin

                  new_tag="$(git describe --tags --abbrev=0 --match 'v[0-9]*' 2>/dev/null || true)"
                  if [ -z "${new_tag}" ] || [ "${new_tag}" = "${PREVIOUS_TAG}" ]; then
                      echo "released=false" >> "$GITHUB_OUTPUT"
                      exit 0
                  fi

                  package_version="$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version")"
                  if [ "${new_tag}" != "v${package_version}" ]; then
                      echo "Newest tag ${new_tag} does not match package.json version ${package_version}" >&2
                      exit 1
                  fi
                  echo "released=true" >> "$GITHUB_OUTPUT"
                  echo "version=${package_version}" >> "$GITHUB_OUTPUT"

            - name: Generate todoist-ai-integrations token
              if: ${{ !cancelled() && steps.published.outputs.released == 'true' }}
              id: integrations_token
              uses: actions/create-github-app-token@v3
              with:
                  app-id: ${{ secrets.DOIST_RELEASE_BOT_ID }}
                  private-key: ${{ secrets.DOIST_RELEASE_BOT_PRIVATE_KEY }}
                  owner: Doist
                  repositories: todoist-ai-integrations
                  permission-contents: write

            - name: Trigger todoist-ai-integrations update
              if: ${{ !cancelled() && steps.published.outputs.released == 'true' }}
              env:
                  GH_TOKEN: ${{ steps.integrations_token.outputs.token }}
                  VERSION: ${{ steps.published.outputs.version }}
              run: |
                  for attempt in 1 2 3; do
                      if gh api \
                        --method POST \
                        -H "Accept: application/vnd.github+json" \
                        -H "X-GitHub-Api-Version: 2022-11-28" \
                        /repos/Doist/todoist-ai-integrations/dispatches \
                        -f event_type=comms-mcp-updated \
                        -f "client_payload[version]=${VERSION}" \
                        -f "client_payload[npm_tag]=latest"; then
                          exit 0
                      fi
                      if [ "$attempt" -lt 3 ]; then
                          sleep 10
                      fi
                  done
                  echo "Failed to send comms-mcp-updated dispatch to todoist-ai-integrations" >&2
                  exit 1
